pre-commit:
  parallel: true
  commands:
    biome-check:
      glob: "src/**/*.{js,ts,astro,json,css}"
      run: npx @biomejs/biome check --write {staged_files} && git add {staged_files}
    astro-check:
      glob: "**/*.{astro,ts,tsx,js,jsx}"
      run: pnpm check

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}
    verify-ds-freeze:
      run: node scripts/verify-ds-freeze.cjs {1}

pre-push:
  parallel: false
  commands:
    llms-txt-limit:
      glob: "public/llms.txt"
      run: |
        lines=$(wc -l < public/llms.txt | tr -d ' ')
        if [ "$lines" -gt 100 ]; then
          echo "ERROR: public/llms.txt is $lines lines (max 100)"
          exit 1
        fi
    build-check:
      run: pnpm build
